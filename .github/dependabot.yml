version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "recette"
    schedule:
      interval: "weekly"
      day: "monday"
    ignore:
      - dependency-name: "eslint*"
      - dependency-name: "@feathersjs/*"
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
    groups:
      minor-and-patch:
        update-types:
          - "patch"
          - "minor"
